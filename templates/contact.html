{% extends 'base.html' %}

{% block title %}Contacto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Formulario de Contacto</h2>

        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('contact') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre:</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Rod Colque" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico:</label>
                        <input type="email" class="form-control" id="email" name="email"
                            placeholder="ejemplo@dominio.com">
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">Telefono:</label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="74541212" required>
                    </div>

                    <div class="mb-3">
                        <label for="message" class="form-label">Mensaje:</label>
                        <textarea class="form-control" id="message" name="message" placeholder="Hola.jpg" rows="4"
                            required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Enviar Mensaje</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
